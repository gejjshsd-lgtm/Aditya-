<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Aditya ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        /* ===========================
   RESPONSIVE DESIGN
=========================== */

html{
    font-size:16px;
}

body{
    min-height:100vh;
    padding:20px;
}

.landing,
.surprise{
    width:100%;
    max-width:900px;
    margin:auto;
    padding:20px;
}

.photo{
    width:clamp(160px,28vw,260px);
    height:clamp(160px,28vw,260px);
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.name{
    font-size:clamp(1.8rem,5vw,3.2rem);
    line-height:1.3;
    margin-top:25px;
}

#message{
    font-size:clamp(1rem,2.5vw,1.5rem);
    line-height:1.8;
    width:min(90%,750px);
    margin:25px auto;
}

.landing h1{
    font-size:clamp(4rem,12vw,8rem);
}

.landing h2{
    font-size:clamp(1.6rem,5vw,2.6rem);
}

.landing p{
    font-size:clamp(1rem,3vw,1.3rem);
    width:min(90%,600px);
    margin:20px auto 30px;
}

button{
    font-size:clamp(1rem,2vw,1.2rem);
    padding:16px 35px;
}

.footer{
    font-size:clamp(.9rem,2vw,1.2rem);
    margin-top:35px;
}

/* ---------- Tablet ---------- */

@media (max-width:768px){

    body{
        padding:15px;
    }

    .landing,
    .surprise{
        padding:10px;
    }

    button{
        width:220px;
    }

}

/* ---------- Mobile ---------- */

@media (max-width:480px){

    body{
        padding:12px;
    }

    .photo{
        width:170px;
        height:170px;
    }

    button{
        width:100%;
        max-width:260px;
        padding:15px;
    }

    #message{
        width:95%;
        line-height:1.7;
    }

}

/* ---------- Very Small Phones ---------- */

@media (max-width:320px){

    .photo{
        width:150px;
        height:150px;
    }

    .landing h2{
        font-size:1.4rem;
    }

}

/* ---------- Large Screens ---------- */

@media (min-width:1600px){

    html{
        font-size:20px;
    }

    .surprise,
    .landing{
        max-width:1100px;
    }

}
    </style>
</head>

<body>

    <audio id="music" loop>
        <source src="starostin-happy-birthday-357371.mp3" type="audio/mp3" type="audio/mpeg">
    </audio>

    <div class="landing" id="landing">

        <h1>🎁</h1>

        <h2>A Special Surprise Is Waiting...</h2>

        <p>Someone made something special just for you ❤️</p>

        <button onclick="openGift()">
            Open Surprise
        </button>

    </div>

    <div class="surprise" id="surprise">

        <div class="photo">

            <img src="WhatsApp Image 2026-07-17 at 2.54.56 PM.jpeg" alt="Aditya's Photo">

        </div>

        <h1 class="name">
            🎉 Happy Birthday Aditya 🎉
        </h1>

        <p id="message"></p>

        <div class="footer">

            Made with ❤️ by Gulshan & Shreya & Muskan & Aman

        </div>

    </div>

    

</body>
<script>
    const text = `Dear Aditya ❤️,

Many many happy returns of the day!

May your life always be filled with happiness, success, laughter and beautiful memories.

Keep smiling...
Keep shining...
Keep being the amazing person you are.

May all your dreams come true.

Have an unforgettable birthday!

🎂🎉🎈❤️`;

    function openGift() {

        document.getElementById("landing").style.display = "none";

        document.getElementById("surprise").style.display = "block";

        document.getElementById("music").play();

        confetti({

            particleCount: 300,

            spread: 180,

            origin: { y: 0.6 }

        });

        typeWriter();

    }

    let i = 0;

    function typeWriter() {

        if (i < text.length) {

            document.getElementById("message").innerHTML += text.charAt(i);

            i++;

            setTimeout(typeWriter, 45);

        }

    }
</script>

</html>
