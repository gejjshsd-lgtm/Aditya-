<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Aditya ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow-x:hidden;

    background:linear-gradient(-45deg,#ff0080,#7928ca,#00dbde,#fc00ff);
    background-size:400% 400%;
    animation:bg 12s ease infinite;

    color:#fff;
    text-align:center;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.landing,
.surprise{
    width:100%;
    max-width:900px;
    padding:20px;
    animation:fade 1s ease;
}

.landing h1{
    font-size:clamp(70px,10vw,120px);
    animation:bounce 2s infinite;
}

.landing h2{
    font-size:clamp(28px,4vw,42px);
    margin:20px 0;
}

.landing p{
    font-size:clamp(16px,2vw,22px);
    margin-bottom:30px;
}

button{
    padding:16px 40px;
    font-size:clamp(16px,2vw,20px);
    border:none;
    border-radius:50px;
    background:#fff;
    color:#ff0080;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 0 25px rgba(255,255,255,.6);
}

button:hover{
    transform:scale(1.08);
}

.surprise{
    display:none;
}

.photo{
    width:clamp(170px,30vw,260px);
    height:clamp(170px,30vw,260px);
    margin:auto;
    padding:8px;
    border-radius:50%;
    background:linear-gradient(45deg,#fff,#ffea00,#00f7ff,#fff);
    animation:rotate 6s linear infinite;
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
}

.name{
    margin-top:25px;
    font-size:clamp(30px,5vw,48px);
    text-shadow:0 0 20px white;
}

#message{
    margin:30px auto;
    width:min(90%,700px);
    font-size:clamp(16px,2vw,24px);
    line-height:1.8;
}

.footer{
    margin-top:30px;
    font-size:clamp(14px,2vw,20px);
    opacity:.8;
}

/* Animations */

@keyframes rotate{
    to{
        transform:rotate(360deg);
    }
}

@keyframes bounce{
    50%{
        transform:translateY(-15px);
    }
}

@keyframes fade{
    from{
        opacity:0;
        transform:scale(.9);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* Tablet */

@media (max-width:768px){

    body{
        padding:15px;
        align-items:flex-start;
    }

    .landing,
    .surprise{
        padding:15px;
        margin-top:30px;
    }

    button{
        width:220px;
    }
}

/* Mobile */

@media (max-width:480px){

    body{
        padding:12px;
    }

    .photo{
        width:170px;
        height:170px;
    }

    button{
        width:100%;
        max-width:260px;
    }

    #message{
        width:95%;
    }
}

/* Very Small Phones */

@media (max-width:320px){

    .photo{
        width:150px;
        height:150px;
    }

    .landing h2{
        font-size:24px;
    }
}

/* Large Screens */

@media (min-width:1400px){

    .landing,
    .surprise{
        max-width:1100px;
    }

    .photo{
        width:300px;
        height:300px;
    }
}
    </style>
</head>

<body>

    <audio id="music" loop>
        <source src="starostin-happy-birthday-357371.mp3" type="audio/mp3" type="audio/mpeg">
    </audio>

    <div class="landing" id="landing">

        <h1>🎁</h1>

        <h2>A Special Surprise Is Waiting...</h2>

        <p>Someone made something special just for you ❤️</p>

        <button onclick="openGift()">
            Open Surprise
        </button>

    </div>

    <div class="surprise" id="surprise">

        <div class="photo">

            <img src="WhatsApp Image 2026-07-17 at 2.54.56 PM.jpeg" alt="Aditya's Photo">

        </div>

        <h1 class="name">
            🎉 Happy Birthday Aditya 🎉
        </h1>

        <p id="message"></p>

        <div class="footer">

            Made with ❤️ by Gulshan & Shreya & Muskan & Aman

        </div>

    </div>

    

</body>
<script>
    const text = `Dear Aditya ❤️,

Many many happy returns of the day!

May your life always be filled with happiness, success, laughter and beautiful memories.

Keep smiling...
Keep shining...
Keep being the amazing person you are.

May all your dreams come true.

Have an unforgettable birthday!

🎂🎉🎈❤️`;

    function openGift() {

        document.getElementById("landing").style.display = "none";

        document.getElementById("surprise").style.display = "block";

        document.getElementById("music").play();

        confetti({

            particleCount: 300,

            spread: 180,

            origin: { y: 0.6 }

        });

        typeWriter();

    }

    let i = 0;

    function typeWriter() {

        if (i < text.length) {

            document.getElementById("message").innerHTML += text.charAt(i);

            i++;

            setTimeout(typeWriter, 45);

        }

    }
</script>

</html>
